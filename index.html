<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <title>Моя VR сцена — Звіт</title>
    <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
  </head>
  <body>
    <h1>Звіт про виконані завдання студентки групи МІм-25 Сорокіної Єлизавети</h1>

    <a-scene embedded style="height: 500px; width: 100%;">
      
      <a-sky color="#7FFFD4"></a-sky>

      <a-light type="ambient" color="#BBB"></a-light>
      <a-light type="directional" position="0 5 0" intensity="0.5"></a-light>

      <a-torus position="-2 1 -5" color="#FFD700" radius="1.2"></a-torus>
      <a-plane position="0 -2 -5" rotation="-90 0 0" width="7" height="7" color="#7BC8A4"></a-plane>
      <a-cylinder position="2 -1 -5" radius="0.5" height="1.5" color="#00BFFF"></a-cylinder>

      <a-entity position="0 1.6 0">
        <a-camera></a-camera>
      </a-entity>
      
    </a-scene>
  </body>
</html>
