<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>ЛР №3 — AR Сорокіна</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
  </head>
  <body style="margin: 0; overflow: hidden;">
    
    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false; detectionMode: mono_and_matrix; matrixCodeType: 3x3;">
      
      <a-assets>
        <img id="woodTexture" src="images/texture.jpg.jpeg">
      </a-assets>

      <a-marker preset="hiro">
        <a-entity
          position="0 1 0"
          rotation="-90 0 0"
          text="value: Sorokina Yelyzaveta; align: center; width: 5; color: black">
        </a-entity>

        <a-sphere 
          position="-0.6 0.5 0" 
          radius="0.4" 
          material="color: black"
          src="#woodTexture">
        </a-sphere>

        <a-cylinder 
          position="0.6 0.5 0" 
          radius="0.2" 
          height="0.6" 
          color="#00BFFF"
          animation="property: rotation; to: 0 360 0; dur: 4000; loop: true; easing: linear">
        </a-cylinder>
      </a-marker>

      <a-marker preset="kanji">
        <a-torus 
          position="0 0.5 0" 
          radius="0.3" 
          radius-tubular="0.05" 
          color="#FFD700"
          rotation="-90 0 0"
          animation="property: scale; from: 1 1 1; to: 1.5 1.5 1.5; dir: alternate; dur: 2000; loop: true">
        </a-torus>
        
        <a-text value="Marker: Kanji" position="0 1.2 0" rotation="-90 0 0" align="center" color="#FFD700"></a-text>
      </a-marker>

      <a-entity camera></a-entity>
      
    </a-scene>
  </body>
</html>
