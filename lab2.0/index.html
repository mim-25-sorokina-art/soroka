<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lab 2.0 - Full Screen AR</title>
    <script src="https://unpkg.com/three@0.133.1/build/three.min.js"></script>
    <script src="https://unpkg.com/mind-ar@1.1.4/dist/mindar-image-three.prod.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #000; }
        /* Примусово розтягуємо контейнер з камерою на весь екран */
        #container { width: 100vw; height: 100vh; position: relative; }
        #startButton {
            position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%);
            padding: 15px 30px; font-size: 18px; z-index: 2000;
            background: #28a745; color: white; border: none; border-radius: 8px; cursor: pointer;
        }
    </style>
</head>
<body>
    <button id="startButton">УВІМКНУТИ КАМЕРУ</button>
    <div id="container"></div>

    <script>
        const start = async () => {
            document.getElementById('startButton').style.display = 'none';

            const mindarThree = new window.MINDAR.IMAGE.MindARThree({
                container: document.getElementById('container'),
                imageTargetSrc: './atlas.mind',
                uiScanning: "no", // ВИМИКАЄМО ту саму "дибільну" полоску сканування
                uiLoading: "no"
            });

            const {renderer, scene, camera} = mindarThree;

            // Світло
            scene.add(new THREE.HemisphereLight(0xffffff, 0xbbbbff, 1));

            // Модель колайдера
            const torus = new THREE.Mesh(
                new THREE.TorusGeometry(0.5, 0.03, 16, 100),
                new THREE.MeshStandardMaterial({color: 0xffffff, transparent: true, opacity: 0.5})
            );
            torus.rotation.x = Math.PI / 2;

            const pGeom = new THREE.SphereGeometry(0.05, 32, 32);
            const pRed = new THREE.Mesh(pGeom, new THREE.MeshStandardMaterial({color: 0xff0000}));
            const pBlue = new THREE.Mesh(pGeom, new THREE.MeshStandardMaterial({color: 0x0000ff}));

            const anchor = mindarThree.addAnchor(0);
            anchor.group.add(torus);
            anchor.group.add(pRed);
            anchor.group.add(pBlue);

            await mindarThree.start();
            
            const clock = new THREE.Clock();
            renderer.setAnimationLoop(() => {
                const t = clock.getElapsedTime() * 2;
                pRed.position.set(Math.cos(t) * 0.5, 0, Math.sin(t) * 0.5);
                pBlue.position.set(Math.cos(-t) * 0.5, 0, Math.sin(-t) * 0.5);
                renderer.render(scene, camera);
            });
        };

        document.getElementById('startButton').addEventListener('click', start);
    </script>
</body>
</html>
