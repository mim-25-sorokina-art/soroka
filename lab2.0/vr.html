<!DOCTYPE html>
<html>
<head>
    <title>Lab 2.0 - VR Three.js</title>
    <script src="https://cdn.jsdelivr.net/npm/three@0.132.2/build/three.min.js"></script>
    <style>body { margin: 0; background: #000; overflow: hidden; }</style>
</head>
<body>
    <script>
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({antialias: true});
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        scene.add(new THREE.AmbientLight(0xffffff, 0.5));
        const light = new THREE.PointLight(0xffffff, 1);
        light.position.set(5, 5, 5);
        scene.add(light);

        const torus = new THREE.Mesh(
            new THREE.TorusGeometry(1, 0.05, 16, 100),
            new THREE.MeshStandardMaterial({color: 0xffffff, transparent: true, opacity: 0.4})
        );
        torus.rotation.x = Math.PI / 2;
        scene.add(torus);

        const pGeom = new THREE.SphereGeometry(0.1, 32, 32);
        const pRed = new THREE.Mesh(pGeom, new THREE.MeshStandardMaterial({color: 0xff0000}));
        const pBlue = new THREE.Mesh(pGeom, new THREE.MeshStandardMaterial({color: 0x0000ff}));
        scene.add(pRed); scene.add(pBlue);

        camera.position.z = 3;
        camera.position.y = 1;
        camera.lookAt(0,0,0);

        function animate() {
            requestAnimationFrame(animate);
            const t = Date.now() * 0.002;
            pRed.position.set(Math.cos(t), 0, Math.sin(t));
            pBlue.position.set(Math.cos(-t), 0, Math.sin(-t));
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
