<!DOCTYPE html>
<html>
<head>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
</head>
<body>
    <a-scene>
        <a-sky color="#111"></a-sky>
        <a-entity position="0 1.5 -2">
            <a-torus radius="0.5" radius-tubular="0.03" material="color: white; opacity: 0.3; transparent: true" rotation="90 0 0"></a-torus>
            <a-entity animation="property: rotation; to: 0 0 360; dur: 2000; easing: linear; loop: true">
                <a-sphere radius="0.05" color="red" position="0.5 0 0"></a-sphere>
            </a-entity>
            <a-entity animation="property: rotation; from: 0 0 360; to: 0 0 0; dur: 2000; easing: linear; loop: true">
                <a-sphere radius="0.05" color="blue" position="0.5 0 0"></a-sphere>
            </a-entity>
        </a-entity>
        <a-camera position="0 1.6 0"></a-camera>
    </a-scene>
</body>
</html>
