<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Лабораторна 1.0 - Колайдер</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.1/dist/mindar-image-aframe.prod.js"></script>
</head>
<body style="margin: 0; overflow: hidden;">
    <a-scene mindar-image="imageTargetSrc: ./atlas.mind;" vr-mode-ui="enabled: false">
        
        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <a-entity mindar-image-target="targetIndex: 0">
            
            <a-torus radius="0.6" radius-tubular="0.05" 
                      material="color: #ffffff; opacity: 0.2; transparent: true" 
                      rotation="90 0 0">
            </a-torus>
            
            <a-light type="point" color="white" intensity="1" position="0 0.5 0.5"></a-light>

            <a-entity animation="property: rotation; to: 0 0 360; dur: 2000; easing: linear; loop: true">
                <a-sphere radius="0.05" color="red" position="0.6 0 0"
                          animation="property: scale; to: 1.2 1.2 1.2; dur: 500; dir: alternate; loop: true">
                </a-sphere>
            </a-entity>

            <a-entity animation="property: rotation; from: 0 0 360; to: 0 0 0; dur: 2000; easing: linear; loop: true">
                <a-sphere radius="0.05" color="blue" position="0.6 0 0"
                          animation="property: scale; to: 1.2 1.2 1.2; dur: 500; dir: alternate; loop: true">
                </a-sphere>
            </a-entity>

        </a-entity>
    </a-scene>
</body>
</html>
