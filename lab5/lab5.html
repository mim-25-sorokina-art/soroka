<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AR Solar System - Fast Motion</title>
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    <script>
      AFRAME.registerComponent('planet', {
        schema: { dist: {type: 'number'}, speed: {type: 'number'} },
        init: function() { this.angle = Math.random() * Math.PI * 2; },
        tick: function(t, dt) {
          // Збільшили множник швидкости, щоб вони крутилися швидше
          this.angle += (this.data.speed / 200) * (dt / 16); 
          const x = Math.cos(this.angle) * this.data.dist;
          const z = Math.sin(this.angle) * this.data.dist;
          this.el.setAttribute('position', {x: x, y: 0, z: z});
        }
      });
    </script>
</head>
<body style="margin: 0; overflow: hidden;">
    <a-scene mindar-image="imageTargetSrc: ./target.mind; autoStart: true; uiLoading: no;" vr-mode-ui="enabled: false">
      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>
      <a-entity mindar-image-target="targetIndex: 0">
          <a-sphere radius="0.1" src="images/sun.jpg" material="shader: flat; color: #FFD700;"></a-sphere>
          
          <a-sphere radius="0.025" src="images/mercury.jpg" color="#AAAAAA" planet="dist: 0.2; speed: 2.5"></a-sphere>
          <a-sphere radius="0.035" src="images/venus.jpg" color="#FFCC33" planet="dist: 0.35; speed: 1.8"></a-sphere>
          <a-sphere radius="0.04" src="images/earth.jpg" color="#2e65d9" planet="dist: 0.5; speed: 1.2"></a-sphere>
          <a-sphere radius="0.03" src="images/mars.jpg" color="#FF4500" planet="dist: 0.65; speed: 0.9"></a-sphere>
      </a-entity>
    </a-scene>
</body>
</html>
