<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AR Solar System - Final</title>
    
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    
    <script>
      AFRAME.registerComponent('planet', {
        schema: {
          dist: {type: 'number'}, 
          speed: {type: 'number'} 
        },
        init: function() {
          this.angle = Math.random() * Math.PI * 2;
        },
        tick: function(time, timeDelta) {
          // Проста анімація по колу для стабільності
          this.angle += (this.data.speed / 1000) * (timeDelta / 16);
          const x = Math.cos(this.angle) * this.data.dist;
          const z = Math.sin(this.angle) * this.data.dist;
          this.el.setAttribute('position', {x: x, y: 0, z: z});
        }
      });
    </script>
</head>
<body style="margin: 0; overflow: hidden;">
    <a-scene mindar-image="imageTargetSrc: ./target.mind; autoStart: true; uiLoading: no;" 
             vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
      
      <a-assets>
          <img id="sun-tex" src="images/sun.jpg">
          <img id="mercury-tex" src="images/mercury.jpg">
          <img id="venus-tex" src="images/venus.jpg">
          <img id="earth-tex" src="images/earth.jpg">
          <img id="mars-tex" src="images/mars.jpg">
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity mindar-image-target="targetIndex: 0">
          
          <a-sphere radius="0.1" src="#sun-tex" material="shader: flat; color: #FFD700;"></a-sphere>

          <a-sphere radius="0.02" src="#mercury-tex" color="#9c9c9c"
                    planet="dist: 0.2; speed: 2"></a-sphere>
          
          <a-sphere radius="0.03" src="#venus-tex" color="#ffe896"
                    planet="dist: 0.35; speed: 1.5"></a-sphere>
          
          <a-sphere radius="0.04" src="#earth-tex" color="#2e65d9"
                    planet="dist: 0.55; speed: 1"></a-sphere>
          
          <a-sphere radius="0.03" src="#mars-tex" color="#d94c2e"
                    planet="dist: 0.75; speed: 0.8"></a-sphere>

      </a-entity>
    </a-scene>
</body>
</html>
