<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>
</head>
<body>
    <a-scene mindar-image="imageTargetSrc: ./marker2.mind;" vr-mode-ui="enabled: false">
        <a-assets>
            <a-asset-item id="m" src="./model.glb"></a-asset-item>
        </a-assets>
        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>
        <a-light type="ambient" intensity="1.5"></a-light>
        <a-entity mindar-image-target="targetIndex: 0">
            <a-gltf-model src="#m" scale="0.5 0.5 0.5" animation="property: rotation; to: 0 360 0; loop: true; dur: 10000"></a-gltf-model>
        </a-entity>
    </a-scene>
</body>
</html>
