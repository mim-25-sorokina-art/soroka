<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Тиждень 9 - Video & Model AR</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>
</head>
<body>
    <a-scene mindar-image="imageTargetSrc: ./targets.mind; uiScanning: yes;" vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
        
        <a-assets>
            <!-- Відео для першого маркера -->
            <video id="myVideo" src="./video.mp4" preload="auto" loop="true" crossorigin="anonymous"></video>
            <!-- Модель для другого маркера -->
            <a-asset-item id="myModel" src="./model.glb"></a-asset-item>
        </a-assets>

        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <!-- Маркер 1: ВІДЕО -->
        <a-entity mindar-image-target="targetIndex: 0">
            <a-video src="#myVideo" width="1" height="0.6" position="0 0 0" 
                     play-on-click></a-video>
        </a-entity>

        <!-- Маркер 2: МОДЕЛЬ -->
        <a-entity mindar-image-target="targetIndex: 1">
            <a-gltf-model src="#myModel" scale="0.2 0.2 0.2" position="0 0 0" 
                          animation="property: rotation; to: 0 360 0; dur: 5000; easing: linear; loop: true">
            </a-gltf-model>
        </a-entity>

    </a-scene>

    <script>
        // Скрипт для запуску відео при знаходженні маркера
        const video = document.querySelector('#myVideo');
        const scene = document.querySelector('a-scene');
        scene.addEventListener('targetFound', event => {
            if (event.detail.targetIndex === 0) video.play();
        });
        scene.addEventListener('targetLost', event => {
            if (event.detail.targetIndex === 0) video.pause();
        });
    </script>
</body>
</html>
