<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <title>Лабораторна робота №2 — Сорокіна</title>
    <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
  </head>
  <body>
    <a-scene>
      <a-assets>
        <img id="myTexture" src="images/texture.jpg">
        
        <a-asset-item id="myModel" src="models/model.glb"></a-asset-item>
      </a-assets>

      <a-text 
        value="Виконала: Сорокіна Єлизавета" 
        font="fonts/ukr-msdf.json" 
        negate="false" 
        color="black" 
        width="8" 
        position="-1.5 3 -4">
      </a-text>

      <a-sphere position="-2 1.25 -5" radius="1.25" src="#myTexture"
                animation="property: material.color; from: #ffffff; to: #00ff00; dur: 5000; loop: true">
      </a-sphere>

      <a-cylinder position="2 1 -5" radius="0.5" height="1.5" color="#00BFFF"
                  animation="property: rotation; to: 0 360 0; dur: 4000; loop: true; easing: linear">
      </a-cylinder>

      <a-entity gltf-model="#myModel" position="0 0 -6" scale="0.5 0.5 0.5"></a-entity>

      <a-sky color="#87CEEB"></a-sky>
      <a-plane position="0 0 -4" rotation="-90 0 0" width="10" height="10" color="#7BC8A4"></a-plane>
    </a-scene>
  </body>
</html>
