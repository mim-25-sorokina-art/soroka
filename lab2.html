<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <title>Лабораторна 2 — Сорокіна</title>
    <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/donmccurdy/aframe-extras@v6.1.1/dist/aframe-extras.min.js"></script>
  </head>
  <body>
    <a-scene>
      <a-assets>
        <img id="myTexture" src="images/texture.jpg">
        <a-asset-item id="myModel" src="models/Shiny%20Lahdi.stl"></a-asset-item>
      </a-assets>

      <a-entity
        position="-1.5 3.2 -4"
        text="value: Студентка: Сорокіна Єлизавета; font: fonts/ukr-msdf.json; negate: false; color: #000; width: 8">
      </a-entity>

      <a-sphere position="-2 1.2 -5" radius="1.2" src="#myTexture"
                animation__rotate="property: rotation; to: 0 360 0; dur: 5000; loop: true; easing: linear"
                animation__color="property: material.color; from: #ffffff; to: #aaffaa; dur: 3000; loop: true">
      </a-sphere>

      <a-cylinder position="2 1 -5" radius="0.5" height="1.5" color="#00BFFF"
                  animation="property: rotation; to: 0 360 0; dur: 5000; loop: true; easing: linear">
      </a-cylinder>

      <a-entity 
        loader-stl="src: #myModel" 
        position="0 0.8 -6" 
        scale="0.15 0.15 0.15" 
        rotation="-90 0 0"
        material="color: #FFD700; metalness: 0.8; roughness: 0.2">
      </a-entity>

      <a-sky color="#87CEEB"></a-sky>
      <a-plane position="0 0 -4" rotation="-90 0 0" width="20" height="20" color="#7BC8A4"></a-plane>
      
      <a-light type="ambient" color="#fff"></a-light>
      <a-light type="directional" position="1 1 1" intensity="0.8"></a-light>
    </a-scene>
  </body>
</html>
