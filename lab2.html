<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <title>Лабораторна 2 — Сорокіна</title>
    <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/donmccurdy/aframe-extras@v7.2.0/dist/aframe-extras.min.js"></script>
  </head>
  <body>
    <a-scene>
      <a-assets>
        <img id="myTexture" src="images/texture.jpg">
        
        <a-asset-item id="myModel" src="models/Shiny%20Lahdi.stl"></a-asset-item>
      </a-assets>

      <a-text 
        value="Студентка: Сорокіна Єлизавета" 
        font="fonts/ukr-msdf.json" 
        negate="false" 
        color="#000" 
        width="9" 
        position="-2.5 3.5 -5">
      </a-text>

      <a-sphere position="-2 1.5 -6" radius="1.3" src="#myTexture"
                animation="property: material.color; from: #ffffff; to: #00ff00; dur: 3000; loop: true">
      </a-sphere>

      <a-cylinder position="2 1 -6" radius="0.6" height="1.8" color="#00BFFF"
                  animation="property: rotation; to: 0 360 0; dur: 5000; loop: true; easing: linear">
      </a-cylinder>

      <a-entity loader-stl="src: #myModel" 
                position="0 0.5 -8" 
                scale="0.04 0.04 0.04" 
                rotation="-90 0 0"
                material="color: #FFD700">
      </a-entity>

      <a-sky color="#87CEEB"></a-sky>
      <a-plane position="0 0 -5" rotation="-90 0 0" width="30" height="30" color="#7BC8A4"></a-plane>
    </a-scene>
  </body>
</html>
