<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>
</head>
<body>
    <a-scene mindar-image="imageTargetSrc: ./marker1.mind;" vr-mode-ui="enabled: false">
        <a-assets>
            <video id="v" src="./video.mp4" loop="true" crossorigin="anonymous" playsinline></video>
        </a-assets>
        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>
        <a-entity mindar-image-target="targetIndex: 0">
            <a-video src="#v" width="1" height="0.6" position="0 0 0"></a-video>
        </a-entity>
    </a-scene>
    <script>
        document.body.addEventListener('click', () => { document.querySelector('#v').play(); });
    </script>
</body>
</html>
