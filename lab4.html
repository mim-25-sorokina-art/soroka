<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>ЛР №4 — Власний маркер Сорокіна</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
  </head>
  <body style="margin: 0; overflow: hidden;">
    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;">
      
      <a-marker preset="hiro">
        <a-box position="0 0.5 0" color="#EF2D5E"></a-box>
      </a-marker>

      <a-marker type="pattern" url="https://mim-25-sorokina-art.github.io/soroka/markers/pattern-my.patt">
        
        <a-text value="Sorokina Yelyzaveta" position="0 1 0" rotation="-90 0 0" align="center" color="#FFD700" width="6"></a-text>
        
        <a-torus position="0 0.5 0" radius="0.3" radius-tubular="0.03" color="#FFD700" rotation="-90 0 0"
                  animation="property: rotation; to: -90 360 0; dur: 3000; loop: true; easing: linear">
        </a-torus>
      </a-marker>

      <a-entity camera></a-entity>
    </a-scene>
  </body>
</html>
