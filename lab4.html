<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>ЛР №4 — Власний маркер Сорокіна</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
  </head>
  <body style="margin: 0; overflow: hidden;">
    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;">
      
      <a-marker preset="hiro">
        <a-box position="0 0.5 0" color="#EF2D5E" 
               animation="property: rotation; to: 0 360 0; dur: 5000; loop: true; easing: linear">
        </a-box>
      </a-marker>

      <a-marker preset="kanji">
        <a-cone position="0 0.5 0" radius-bottom="0.3" height="0.7" color="#4CC3D9"
                animation="property: scale; from: 1 1 1; to: 1.2 1.2 1.2; dir: alternate; dur: 2000; loop: true">
        </a-cone>
      </a-marker>

      <a-marker type="pattern" url="markers/pattern-my.patt">
        <a-text value="Sorokina Yelyzaveta" position="0 1 0" rotation="-90 0 0" align="center" color="#FFD700" width="6"></a-text>
        
        <a-torus position="0 0.5 0" radius="0.3" radius-tubular="0.03" color="#FFD700" rotation="-90 0 0"
                  animation="property: rotation; to: -90 360 0; dur: 3000; loop: true; easing: linear">
        </a-torus>
      </a-marker>

      <a-entity camera></a-entity>
    </a-scene>
  </body>
</html>
