<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>ЛР 4 - Сорокіна</title>
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js@master/aframe/build/aframe-ar.js"></script>
  </head>
  <body style="margin: 0; overflow: hidden;">
    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;">
      
      <a-marker preset="hiro">
        <a-box position="0 0.5 0" color="red"></a-box>
      </a-marker>

      <a-marker type="pattern" url="markers/pattern-images.patt">
        <a-torus position="0 0.5 0" radius="0.3" radius-tubular="0.03" color="gold"
                  animation="property: rotation; to: 0 360 0; dur: 3000; loop: true">
        </a-torus>
      </a-marker>

      <a-entity camera></a-entity>
    </a-scene>
  </body>
</html>
