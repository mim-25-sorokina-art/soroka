<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Lab 6 - Geometry</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.1/dist/mindar-image-aframe.prod.js"></script>
    <script>
      AFRAME.registerComponent('network', {
        init: function() {
          this.markers = {
            'A': document.querySelector('#mA'), 'B': document.querySelector('#mB'),
            'C': document.querySelector('#mC'), 'D': document.querySelector('#mD')
          };
          this.visible = { 'A': false, 'B': false, 'C': false, 'D': false };
          this.lines = {};
          this.txt = document.querySelector('#stats');

          const pairs = [['A','B'], ['B','C'], ['C','D'], ['D','A']];
          pairs.forEach(p => {
            const l = document.createElement('a-cylinder');
            l.setAttribute('radius', '0.01');
            l.setAttribute('material', 'color: #00FF00');
            l.setAttribute('visible', false);
            this.el.sceneEl.appendChild(l);
            this.lines[p.join('')] = l;
          });

          Object.keys(this.markers).forEach(id => {
            this.markers[id].addEventListener("targetFound", () => { this.visible[id] = true; });
            this.markers[id].addEventListener("targetLost", () => { this.visible[id] = false; });
          });
        },
        tick: function() {
          let p = 0;
          const pairs = [['A','B'], ['B','C'], ['C','D'], ['D','A']];
          pairs.forEach(pair => {
            const l = this.lines[pair.join('')];
            if (this.visible[pair[0]] && this.visible[pair[1]]) {
              const p1 = new THREE.Vector3(), p2 = new THREE.Vector3();
              this.markers[pair[0]].object3D.getWorldPosition(p1);
              this.markers[pair[1]].object3D.getWorldPosition(p2);
              const d = p1.distanceTo(p2);
              l.setAttribute('height', d);
              l.setAttribute('position', {x:(p1.x+p2.x)/2, y:(p1.y+p2.y)/2, z:(p1.z+p2.z)/2});
              l.object3D.lookAt(p2); l.object3D.rotateX(Math.PI/2);
              l.setAttribute('visible', true); p += d;
            } else { l.setAttribute('visible', false); }
          });
          if(this.visible['A'] && this.visible['B'] && this.visible['C']) {
            this.txt.setAttribute('value', 'Perimeter: ' + p.toFixed(2) + 'm');
          }
        }
      });
    </script>
</head>
<body style="margin: 0; overflow: hidden;">
    <a-scene mindar-image="imageTargetSrc: ./targets6.mind; maxTrack: 4;" vr-mode-ui="enabled: false" network>
        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>
        <a-entity id="mA" mindar-image-target="targetIndex: 0"><a-sphere radius="0.05" color="red"></a-sphere></a-entity>
        <a-entity id="mB" mindar-image-target="targetIndex: 1"><a-sphere radius="0.05" color="blue"></a-sphere></a-entity>
        <a-entity id="mC" mindar-image-target="targetIndex: 2"><a-sphere radius="0.05" color="green"></a-sphere></a-entity>
        <a-entity id="mD" mindar-image-target="targetIndex: 3"><a-sphere radius="0.05" color="orange"></a-sphere></a-entity>
        <a-text id="stats" value="Scan A, B, C, D" position="-0.5 -1 -2" color="white" width="3"></a-text>
    </a-scene>
</body>
</html>
