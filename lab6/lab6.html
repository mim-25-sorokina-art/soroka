<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Лабораторна №6 - Чотирикутник AR</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.1/dist/mindar-image-aframe.prod.js"></script>
    <script>
      AFRAME.registerComponent('geometry-calculator', {
        init: function() {
          this.markers = {
            'A': document.querySelector('#mA'), 'B': document.querySelector('#mB'),
            'C': document.querySelector('#mC'), 'D': document.querySelector('#mD')
          };
          this.visible = { 'A': false, 'B': false, 'C': false, 'D': false };
          this.lines = {};
          this.info = document.querySelector('#info-text');

          // Створюємо 4 лінії для периметра чотирикутника
          const pairs = [['A','B'], ['B','C'], ['C','D'], ['D','A']];
          pairs.forEach(p => {
            const l = document.createElement('a-cylinder');
            l.setAttribute('radius', '0.01');
            l.setAttribute('material', 'color: #00FF00');
            l.setAttribute('visible', false);
            this.el.sceneEl.appendChild(l);
            this.lines[p.join('')] = l;
          });

          Object.keys(this.markers).forEach(id => {
            this.markers[id].addEventListener("targetFound", () => { this.visible[id] = true; });
            this.markers[id].addEventListener("targetLost", () => { this.visible[id] = false; });
          });
        },

        calcDist: function(p1, p2) { return p1.distanceTo(p2); },
        
        calcArea: function(p1, p2, p3) {
          const a = p1.distanceTo(p2), b = p2.distanceTo(p3), c = p3.distanceTo(p1);
          const s = (a + b + c) / 2;
          return Math.sqrt(s * (s - a) * (s - b) * (s - c)) || 0;
        },

        tick: function() {
          let perimeter = 0;
          const pos = {};
          
          // Оновлення ліній та збір позицій
          const pairs = [['A','B'], ['B','C'], ['C','D'], ['D','A']];
          pairs.forEach(pair => {
            const id1 = pair[0], id2 = pair[1];
            if (this.visible[id1] && this.visible[id2]) {
              const v1 = new THREE.Vector3(), v2 = new THREE.Vector3();
              this.markers[id1].object3D.getWorldPosition(v1);
              this.markers[id2].object3D.getWorldPosition(v2);
              pos[id1] = v1; pos[id2] = v2;

              const l = this.lines[id1+id2];
              const d = v1.distanceTo(v2);
              l.setAttribute('height', d);
              l.setAttribute('position', {x:(v1.x+v2.x)/2, y:(v1.y+v2.y)/2, z:(v1.z+v2.z)/2});
              l.object3D.lookAt(v2); l.object3D.rotateX(Math.PI/2);
              l.setAttribute('visible', true);
              perimeter += d;
            } else { this.lines[id1+id2].setAttribute('visible', false); }
          });

          // Розрахунок площ трикутників, якщо видно всі 4 маркери
          if (this.visible.A && this.visible.B && this.visible.C && this.visible.D) {
            const sABC = this.calcArea(pos.A, pos.B, pos.C);
            const sADC = this.calcArea(pos.A, pos.D, pos.C);
            const sABD = this.calcArea(pos.A, pos.B, pos.D);
            const sBCD = this.calcArea(pos.B, pos.C, pos.D);
            
            this.info.setAttribute('value', 
              `Perimeter: ${perimeter.toFixed(2)}m\nArea ABC: ${sABC.toFixed(3)}\nArea ADC: ${sADC.toFixed(3)}\nTotal Area: ${(sABC+sADC).toFixed(3)}`);
          } else {
            this.info.setAttribute('value', 'Scan all 4 markers (A, B, C, D)');
          }
        }
      });
    </script>
</head>
<body style="margin: 0; overflow: hidden;">
    <a-scene mindar-image="imageTargetSrc: ./targets6.mind; maxTrack: 4; filterMinCF: 0.0001;" vr-mode-ui="enabled: false" geometry-calculator>
        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <a-entity id="mA" mindar-image-target="targetIndex: 0"><a-sphere radius
